<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub del Cumpleaños de Andy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Fondo de pantalla */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://t4.ftcdn.net/jpg/04/19/38/47/360_F_419384788_LRXd3XpqTxjnyRLethyithLwPE26ksrv.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* LOGO */
        .logo-vertical {
            width: 220px; /* Un poco más grande al ser el único logo */
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.6));
        }

        /* CUADRO DE BIENVENIDA (MODAL) */
        #modal-bienvenida {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .cuadro-info {
            background: #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #00d2ff;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .cuadro-info h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .cuadro-info p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-empezar {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-empezar:hover {
            transform: scale(1.1);
            background: #ffffff;
        }

        /* INTERFAZ PRINCIPAL */
        .menu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            max-width: 550px;
            justify-content: center;
        }

        .btn-opcion {
            color: white;
            text-decoration: none;
            padding: clamp(18px, 3vh, 25px);
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .btn-inv { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
        .btn-esc { background: linear-gradient(45deg, #9c27b0, #ba68c8); }
        
        .btn-git { 
            background: linear-gradient(45deg, #333, #000);
            border: 1px solid #555;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn-opcion:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* IFRAME FULLSCREEN */
        #contenedorGenially {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 5000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-volver {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 6000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
        }

        @media (min-width: 768px) {
            .btn-inv, .btn-esc { width: calc(50% - 8px); }
        }
    </style>
</head>
<body>

    <!-- Cuadro de Bienvenida -->
    <div id="modal-bienvenida">
        <div class="cuadro-info">
            <h2>¡Hola!</h2>
            <p>Bienvenidos al hub del cumpleaños de Andy.<br>Pulsa empezar para continuar.</p>
            <button class="btn-empezar" onclick="cerrarBienvenida()">EMPEZAR</button>
        </div>
    </div>

    <!-- Logo Vertical -->
    <img src="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png" alt="Logo Cumpleaños de Andy" class="logo-vertical">

    <div class="menu-container">
        <button class="btn-opcion btn-inv" onclick="abrir('https://view.genially.com/69f5b407e5dfae9ae1897d74')">💌 INVITACIÓN</button>
        <button class="btn-opcion btn-esc" onclick="abrir('https://view.genially.com/69f624e1d0a769f8e2813e36')">🎮 ESCAPE ROOM</button>
        
        <!-- Botón de GitHub -->
        <button class="btn-opcion btn-git" onclick="window.open('https://github.com/bypssd/cumple/', '_blank')">
            📂 Visitar repo de GitHub
        </button>
    </div>

    <div id="contenedorGenially">
        <a href="javascript:cerrar()" class="btn-volver">⬅ VOLVER</a>
        <iframe id="iframeG" src=""></iframe>
    </div>

    <script>
        function cerrarBienvenida() {
            document.getElementById('modal-bienvenida').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('modal-bienvenida').style.display = 'none';
            }, 500);
        }

        function abrir(url) {
            document.getElementById('contenedorGenially').style.display = 'block';
            document.getElementById('iframeG').src = url;
        }

        function cerrar() {
            document.getElementById('contenedorGenially').style.display = 'none';
            document.getElementById('iframeG').src = "";
        }
        
        console.log("%c¡ALTO AHÍ, BYPASSER!", "color: #00d2ff; font-size: 25px; font-weight: bold; text-shadow: 2px 2px black;");
        console.log("Detectado intento de intrusión en el Hub de Andy.");
        console.log("Tu castigo por cotillear el código es traerme una tarta de chocolate.");
    </script>
</body>
</html>
